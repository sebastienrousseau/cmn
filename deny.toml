# cargo-deny 0.19+ configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "CC0-1.0",
    "ISC",
    "0BSD",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
highlight = "all"

[advisories]
